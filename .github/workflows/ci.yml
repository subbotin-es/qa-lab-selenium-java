name: QA Lab — Selenium Java + ExtentReports

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 10 * * 1'   # Monday 10:00 UTC
  workflow_dispatch:   

jobs:
  test:
    name: Run TestNG Tests
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Check code style
        run: mvn checkstyle:check

      - name: Run smoke tests
        run: mvn test -Dsurefire.suiteXmlFiles=src/test/resources/testng-smoke.xml -Dextent.report.path=test-output/ExtentReports/smoke-report.html
        env:
          BASE_URL: https://subbotin.es

      - name: Run full regression
        if: success()
        run: mvn test -Dextent.report.path=test-output/ExtentReports/regression-report.html
        env:
          BASE_URL: https://subbotin.es

      - name: Upload ExtentReports artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: extent-report
          path: test-output/ExtentReports/
          retention-days: 30

      - name: Deploy ExtentReport to GitHub Pages
        if: github.ref == 'refs/heads/main' && always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./test-output/ExtentReports
          destination_dir: extent

  performance:
    name: Gatling SLO Check
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Gatling smoke simulation
        run: |
          mvn gatling:test -Pperformance \
            -Dgatling.simulationClass=simulations.QALabSmokeSimulation
        env:
          BASE_URL: https://subbotin.es

      - name: Run Gatling baseline simulation (main only)
        if: github.ref == 'refs/heads/main'
        run: |
          mvn gatling:test -Pperformance \
            -Dgatling.simulationClass=simulations.QALabBaselineSimulation
        env:
          BASE_URL: https://subbotin.es

      - name: Upload Gatling HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gatling-report
          path: performance/target/gatling/
          retention-days: 14
